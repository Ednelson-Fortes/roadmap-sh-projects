<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Grid</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>Image Grid Layout</h1>
    </header>

    <main>
        <section class="grid-container">
            <img class="tall" src="./img/Uma-praia-enevoada-com-uma-grande-formação-rochosa-em-primeiro-plano..jpg"
                alt="Uma praia enevoada com uma grande formação rochosa em primeiro plano.">
            <img src="./img/Uma-mesa-repleta-de-pratos-e-tigelas-de-comida.jpg"
                alt="Uma mesa repleta de pratos e tigelas de comida.">
            <img class="tall" src="./img/Uma-fileira-de-prédios-de-apartamentos-brancos-ao-lado-de-uma-rua.jpg"
                alt="Uma fileira de prédios de apartamentos brancos ao lado de uma rua.">
            <img class="tall" src="./img/Um-prédio-com-uma-porta-vermelha-e-uma-árvore-em-frente.jpg"
                alt="Um prédio com uma porta vermelha e uma árvore em frente.">
            <img src="./img/Uma-sala-de-estar-com-um-sofá-branco-e-uma-janela-redonda.jpg"
                alt="Uma sala de estar com um sofá branco e uma janela redonda.">
            <img src="./img/Vista-de-uma-praia-do-alto-de-uma-colina.jpg"
                alt="Vista de uma praia do alto de uma colina.">
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Ednelson Fortes. Todos os direitos reservados.</p>
    </footer>
</body>

</html>
